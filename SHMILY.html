<script>

function secretClick(){
  secretCount++;

    document.getElementById("secretText").innerText =
    "Happy birthday 💖\n\n I hope all your wishes and prayers come true. Keep being a wonderful person to others ✨\n\nStay healthy, stay kind… and may happiness always find its way to you. GOMAWO ☺️";
  }

}

function goHome(){
  window.location.href = "index.html";
}

setTimeout(() => {
  let btn = document.getElementById("backBtn");
  btn.style.display = "inline-block";

  setTimeout(()=>{

  },100);
}, 3000);

</script>
