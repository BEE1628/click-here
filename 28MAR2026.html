}
img{

/* tombol home */
#backBtn{
  display:none;

  color:white;
  cursor:pointer;
  opacity:0;
  transition:0.5s;
}

</style>
</head>

<body>

<img src="gif9.gif">

<!-- MUSIK -->

</audio>

<button onclick="nextSong()" style="
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4da6;

<!-- TOMBOL HOME -->
<button id="backBtn" onclick="goHome()">
🏠 Wanna go back?
</button>



<script>
function nextSong(){
  window.location.href = "haengbokae.html";
}

function goHome(){

}

// tampilkan tombol setelah 3 detik (fade)
setTimeout(() => {

  btn.style.display = "inline-block";

    btn.style.opacity = 1;
  },100);
}, 3000);
